<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake 2048</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="score-box">
      <div class="score-line"><span class="label">أعلى رقم</span><span id="best" class="value">2</span></div>
      <div class="score-line"><span class="label">النقاط</span><span id="score" class="value">0</span></div>
      <div class="score-line"><span class="label">الطول</span><span id="length" class="value">1</span></div>
    </div>
  </div>

  <!-- Leaderboard (placeholder حتى نضيف البوتات) -->
  <div id="leaderboard">
    <div class="lb-title">المتصدّرون</div>
    <ol id="lb-list"></ol>
  </div>

  <!-- شاشة البداية -->
  <div id="start-screen" class="overlay">
    <div class="panel">
      <h1>Snake&nbsp;2048</h1>
      <p>حرّك الماوس (أو إصبعك) لتوجيه الثعبان.<br/>
         كُل المكعبات الأصغر أو المساوية لرأسك، وادمج الأرقام المتشابهة.</p>
      <input id="name-input" type="text" maxlength="14" placeholder="اكتب اسمك" />
      <div class="hint">
        <span><b>⚡</b> سرعة</span>
        <span><b>×2</b> مضاعفة</span>
        <span><b>÷2</b> نصف</span>
        <span class="click-hint">انقر بالماوس لدفعة سرعة</span>
      </div>
      <button id="play-btn">ابدأ اللعب</button>
    </div>
  </div>

  <!-- شاشة النهاية -->
  <div id="over-screen" class="overlay hidden">
    <div class="panel">
      <h1>انتهت اللعبة</h1>
      <p>أعلى رقم: <span id="final-best">2</span><br/>
         النقاط: <span id="final-score">0</span></p>
      <button id="restart-btn">إعادة اللعب</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
