<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake 2048</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="score-box">
      <div class="score-line"><span class="label">أعلى رقم</span><span id="best" class="value">2</span></div>
      <div class="score-line"><span class="label">النقاط</span><span id="score" class="value">0</span></div>
      <div class="score-line"><span class="label">الطول</span><span id="length" class="value">1</span></div>
    </div>
    <div id="boost-bar-wrap">
      <div id="boost-bar-fill"></div>
      <span id="boost-bar-label">⚡</span>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="leaderboard">
    <div class="lb-title">المتصدّرون</div>
    <ol id="lb-list"></ol>
  </div>

  <!-- ===== شاشة البداية ===== -->
  <div id="start-screen" class="overlay">
    <div class="panel">
      <h1>Snake 2048</h1>
      <p>حرّك الماوس لتوجيه الثعبان · اضغط باستمرار للتسارع</p>

      <input id="name-input" type="text" maxlength="14" placeholder="اكتب اسمك" autocomplete="off"/>

      <div class="hint">
        <span><b>⚡</b> سرعة</span>
        <span><b>×2</b> مضاعفة</span>
        <span><b>÷2</b> نصف</span>
        <span class="click-hint">اضغط مطوّلاً / Space للتسارع</span>
      </div>

      <!-- ===== وضع منفرد / جماعي ===== -->
      <div id="mode-switch">
        <button id="btn-solo"  class="switch-btn active" onclick="switchMode('solo')">منفرد</button>
        <button id="btn-multi" class="switch-btn"        onclick="switchMode('multi')">جماعي</button>
      </div>

      <!-- Solo -->
      <div id="panel-solo" class="sub-panel">
        <button id="play-btn" class="main-btn">ابدأ اللعب</button>
      </div>

      <!-- Multi -->
      <div id="panel-multi" class="sub-panel hidden">

        <!-- استضافة -->
        <div id="section-host">
          <div class="section-title">استضافة غرفة</div>

          <!-- سويتش كلمة سر -->
          <div class="toggle-row">
            <span class="toggle-label">كلمة سر</span>
            <label class="toggle-switch">
              <input type="checkbox" id="use-password" onchange="togglePassword()"/>
              <span class="slider"></span>
            </label>
          </div>

          <input id="host-password" type="text" maxlength="20"
                 placeholder="كلمة السر" autocomplete="off"
                 class="hidden"/>

          <button id="host-btn" class="main-btn" onclick="doHost()">أنشئ غرفة</button>

          <div id="room-code-wrap" class="hidden">
            <div class="room-label">كود الغرفة</div>
            <div id="room-code-display"></div>
            <button class="small-btn" onclick="copyCode()">نسخ الكود</button>
            <div id="host-status" class="status-msg">في انتظار اللاعبين…</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- انضمام -->
        <div id="section-join">
          <div class="section-title">انضمام</div>
          <input id="join-code-input" type="text" maxlength="40"
                 placeholder="كود الغرفة" autocomplete="off"/>
          <input id="join-password" type="text" maxlength="20"
                 placeholder="كلمة السر (اتركها فارغة إن لم تكن هناك)" autocomplete="off"/>
          <button id="join-btn" class="main-btn" onclick="doJoin()">انضمام</button>
          <div id="join-status" class="status-msg"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== شاشة النهاية ===== -->
  <div id="over-screen" class="overlay hidden">
    <div class="panel">
      <h1>انتهت اللعبة</h1>
      <p>أعلى رقم: <span id="final-best">2</span><br/>
         النقاط: <span id="final-score">0</span></p>
      <button id="restart-btn" class="main-btn">إعادة اللعب</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
